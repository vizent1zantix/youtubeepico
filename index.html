<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube - Broadcast Yourself</title>
    <style>
        /* ESTILO RETRO 2006 */
        body { font-family: Arial, Helvetica, sans-serif; background: #fff; margin: 0; color: #333; }
        
        /* Header con botón de subida */
        #header { 
            background: #eee; 
            padding: 10px 20px; 
            border-bottom: 1px solid #ccc; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { font-size: 28px; font-weight: bold; color: #000; text-decoration: none; letter-spacing: -1px; }
        .logo span { background: #f00; color: #fff; padding: 2px 6px; border-radius: 5px; margin-left: 2px; }
        
        .upload-section { display: flex; align-items: center; gap: 10px; }
        .btn-upload { 
            background: #f0f0f0; 
            border: 1px solid #999; 
            padding: 4px 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 13px;
        }
        .btn-upload:hover { background: #e0e0e0; }

        /* Barra de búsqueda */
        #search-container { 
            background: #d3d3d3; 
            padding: 12px; 
            text-align: center; 
            border-bottom: 1px solid #999; 
        }
        #search-input { width: 400px; padding: 4px; border: 1px solid #666; }
        #search-btn { padding: 3px 10px; font-weight: bold; cursor: pointer; }

        /* Layout Principal */
        #main-content { 
            display: flex; 
            max-width: 1100px; 
            margin: 20px auto; 
            gap: 25px; 
            padding: 0 15px;
        }

        /* Reproductor */
        #video-side { width: 65%; }
        .video-box { 
            background: #000; 
            width: 100%; 
            aspect-ratio: 4/3; 
            border: 5px solid #333; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        video { width: 100%; height: 100%; }
        #video-info { margin-top: 15px; border: 1px solid #ccc; padding: 10px; background: #f9f9f9; }
        #video-info h2 { font-size: 18px; margin: 0 0 5px 0; color: #0033cc; }

        /* Sidebar de videos */
        #sidebar { width: 35%; border: 1px solid #ccc; background: #fff; padding: 10px; height: fit-content; }
        .sidebar-header { font-weight: bold; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 10px; }
        .video-item { 
            display: block; 
            margin-bottom: 12px; 
            text-decoration: none; 
            color: #0033cc; 
            font-size: 13px; 
            cursor: pointer;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 4px;
        }
        .video-item:hover { color: #f00; background: #f2f2f2; }

        #loading-msg { font-style: italic; color: #666; font-size: 12px; }
    </style>
</head>
<body>

<div id="header">
    <a href="#" class="logo" onclick="location.reload()">You<span>Tube</span></a>
    <div class="upload-section">
        <input type="file" id="file-selector" style="display:none" accept="video/*">
        <button class="btn-upload" onclick="document.getElementById('file-selector').click()">Upload</button>
        <span style="font-size: 11px;"><strong>Sign Up</strong> | <strong>Log In</strong></span>
    </div>
</div>

<div id="search-container">
    <input type="text" id="search-input" placeholder="Escribe para buscar un video público...">
    <button id="search-btn" onclick="buscarVideos()">Search</button>
</div>

<div id="main-content">
    <div id="video-side">
        <div class="video-box">
            <video id="main-player" controls autoplay></video>
        </div>
        <div id="video-info">
            <h2 id="current-title">Cargando videos de la comunidad...</h2>
            <p style="font-size: 11px; color: #666;">Added: March 22, 2026 | From: Community</p>
            <div style="color: #FFCC00; font-size: 16px;">★★★★★</div>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">Videos Recientes</div>
        <div id="video-list">
            <span id="loading-msg">Conectando con la base de datos...</span>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN CRÍTICA (RELLENA ESTO) ---
    const CLOUD_NAME = "santi_vicent"; // Tu nombre de usuario en Cloudinary
    const UPLOAD_PRESET = "preset_2006"; // Tu preset "Unsigned"
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzoeQ9_h7XmN-4HyRAZrmRBCIox2pSZdudjdte-MGYwe0MVT1nrwjQgAn911AEM0dMSDQ/exec"; // La URL de tu Google Sheet Script

    let todosLosVideos = [];

    // 1. CARGAR VIDEOS AL INICIAR
    async function cargarContenido() {
        try {
            const respuesta = await fetch(APPS_SCRIPT_URL);
            todosLosVideos = await respuesta.json();
            renderizarLista(todosLosVideos);
            
            // Cargar el primer video automáticamente si existe
            if(todosLosVideos.length > 0) {
                seleccionarVideo(todosLosVideos[0]);
            } else {
                document.getElementById('current-title').innerText = "No hay videos aún. ¡Sé el primero!";
            }
        } catch (error) {
            document.getElementById('loading-msg').innerText = "Error al conectar con la base de datos.";
        }
    }

    // 2. SUBIR VIDEO (Cloudinary + Google Sheets)
   document.getElementById('file-selector').onchange = async function(e) {
    const archivo = e.target.files[0];
    if (!archivo) return;

    alert("1. Iniciando subida a Cloudinary...");

    const formData = new FormData();
    formData.append('file', archivo);
    formData.append('upload_preset', UPLOAD_PRESET);

    try {
        // A. SUBIR A CLOUDINARY
        const resCloud = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
            method: 'POST',
            body: formData
        });
        const dataCloud = await resCloud.json();

        // Verificamos si Cloudinary nos dio el link
        if (!dataCloud.secure_url) {
            alert("Error: Cloudinary no devolvió un link. Revisa tu Cloud Name y Preset.");
            console.log(dataCloud);
            return;
        }

        alert("2. Video en la nube. Guardando en Google Sheets...");

        // B. GUARDAR EN GOOGLE SHEETS
        const datosVideo = {
            nombre: archivo.name.split('.')[0],
            url: dataCloud.secure_url, // ESTE ES EL LINK QUE FALTA
            id: Date.now()
        };

        // Usamos una técnica más compatible para enviar datos a Google
        await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', // Muy importante para Google Scripts
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datosVideo)
        });

        alert("3. ¡Éxito! El video ya debería aparecer en la lista.");
        setTimeout(() => location.reload(), 1000); // Recarga la página para ver los cambios

    } catch (err) {
        alert("Hubo un error crítico: " + err.message);
        console.error(err);
    }
};
            const resCloud = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
                method: 'POST',
                body: formData
            });
            const dataCloud = await resCloud.json();

            // B. Guardar datos en Google Sheets
            const datosVideo = {
                nombre: archivo.name.split('.')[0], // Quitar la extensión .mp4
                url: dataCloud.secure_url,
                id: Date.now()
            };

            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(datosVideo)
            });

            alert("¡Video subido exitosamente! Aparecerá en la lista en unos segundos.");
            setTimeout(cargarContenido, 2000); // Recargar lista

        } catch (err) {
            alert("Hubo un error en la subida. Revisa la configuración.");
        }
    };

    // 3. MOSTRAR VIDEOS Y BUSCAR
    function renderizarLista(lista) {
        const contenedor = document.getElementById('video-list');
        contenedor.innerHTML = "";
        
        // Mostrar los más nuevos primero
        [...lista].reverse().forEach(video => {
            const item = document.createElement('div');
            item.className = "video-item";
            item.innerText = "▶ " + video.nombre;
            item.onclick = () => seleccionarVideo(video);
            contenedor.appendChild(item);
        });
    }

    function seleccionarVideo(video) {
        document.getElementById('main-player').src = video.url;
        document.getElementById('current-title').innerText = video.nombre;
        window.history.pushState({}, '', `?v=${video.id}`);
    }

    function buscarVideos() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtrados = todosLosVideos.filter(v => v.nombre.toLowerCase().includes(query));
        renderizarLista(filtrados);
    }

    // Arrancar la web
    window.onload = cargarContenido;
</script>

</body>
</html>
